services:
  db:
    image: mysql:8.4
    container_name: expensetracker_db_dev
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-expensetracker}
      MYSQL_USER: ${MYSQL_USER:-expenseuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-expensepass}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data_dev:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - expensetracker_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER:-expenseuser}", "-p${MYSQL_PASSWORD:-expensepass}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expensetracker_web_dev
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      DEBUG: "True"
      USE_MYSQL: "True"
      MYSQL_HOST: db
      MYSQL_PORT: "3306"
    ports:
      - "8000:8000"
    volumes:
      # Mount source code for hot-reload in development
      - .:/app
      - media_files_dev:/app/media
    command: python manage.py runserver 0.0.0.0:8000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - expensetracker_net

volumes:
  mysql_data_dev:
    driver: local
  media_files_dev:
    driver: local

networks:
  expensetracker_net:
    driver: bridge
