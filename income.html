<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ExpenseIQ - Track your income sources and earnings">
  <title>ExpenseIQ — Income</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
  <div id="layoutSidebar"></div>
  <div class="main-content">
    <div id="layoutTopbar"></div>
    <div class="page fade-in">

      <!-- KPI Cards -->
      <div class="kpi-grid">
        <div class="kpi-card emerald fade-in stagger-1">
          <div class="kpi-icon emerald">💰</div>
          <div class="kpi-label">Total Income</div>
          <div class="kpi-value" id="incTotal">$0</div>
          <span class="kpi-change up">▲ 12.5% vs last month</span>
        </div>
        <div class="kpi-card purple fade-in stagger-2">
          <div class="kpi-icon purple">📊</div>
          <div class="kpi-label">Average Monthly</div>
          <div class="kpi-value" id="incAvg">$0</div>
          <span class="kpi-change up">▲ 5.2%</span>
        </div>
        <div class="kpi-card cyan fade-in stagger-3">
          <div class="kpi-icon cyan">🎯</div>
          <div class="kpi-label">Income Sources</div>
          <div class="kpi-value" id="incSources">0</div>
          <span class="kpi-change up">Active streams</span>
        </div>
        <div class="kpi-card orange fade-in stagger-4">
          <div class="kpi-icon orange">📈</div>
          <div class="kpi-label">Best Month</div>
          <div class="kpi-value" id="incBest">$0</div>
          <span class="kpi-change up">This month</span>
        </div>
      </div>

      <!-- Monthly Income Chart -->
      <div class="card fade-in" style="margin-bottom:24px">
        <div class="card-header">
          <div>
            <div class="card-title">Monthly Income Trend</div>
            <div class="card-subtitle">Income over the last 6 months</div>
          </div>
        </div>
        <div class="chart-container"><canvas id="incomeChart"></canvas></div>
      </div>

      <!-- Income Table -->
      <div class="card fade-in">
        <div class="card-header">
          <div class="card-title">Income History</div>
          <button class="btn btn-primary btn-sm" onclick="openModal('incomeFormModal')">+ Add Income</button>
        </div>
        <div class="table-wrapper">
          <table>
            <thead><tr><th>Source</th><th>Description</th><th>Date</th><th>Method</th><th>Amount</th></tr></thead>
            <tbody id="incomeTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- FAB -->
    <button class="fab" onclick="openModal('incomeFormModal')">+</button>

    <!-- Income Form Modal -->
    <div class="modal-overlay" id="incomeFormModal">
      <div class="modal">
        <div class="modal-header">
          <h2 class="modal-title">Add Income</h2>
          <button class="modal-close" onclick="closeModal('incomeFormModal')">✕</button>
        </div>
        <form id="incomeForm">
          <div class="form-group">
            <label class="form-label">Amount ($) *</label>
            <input type="number" class="form-input" placeholder="0.00" required id="iAmount" min="0.01" step="0.01">
          </div>
          <div class="form-group">
            <label class="form-label">Income Source *</label>
            <select class="form-select" id="iSource" required>
              <option value="">Select source</option>
              <option value="Salary">💼 Salary</option>
              <option value="Freelance">💻 Freelance</option>
              <option value="Dividends">📈 Dividends</option>
              <option value="Side Project">🚀 Side Project</option>
              <option value="Rental">🏠 Rental Income</option>
              <option value="Other">📦 Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Description</label>
            <textarea class="form-textarea" placeholder="Income description..." id="iDesc" rows="3"></textarea>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
            <div class="form-group">
              <label class="form-label">Date *</label>
              <input type="date" class="form-input" id="iDate" required>
            </div>
            <div class="form-group">
              <label class="form-label">Payment Source</label>
              <select class="form-select" id="iMethod">
                <option value="Bank Transfer">🏦 Bank Transfer</option>
                <option value="PayPal">💳 PayPal</option>
                <option value="Stripe">💰 Stripe</option>
                <option value="Cash">💵 Cash</option>
                <option value="Brokerage">📊 Brokerage</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Notes</label>
            <input type="text" class="form-input" placeholder="Optional notes" id="iNotes">
          </div>
          <div style="display:flex;gap:12px;margin-top:24px">
            <button type="submit" class="btn btn-primary" style="flex:1">Add Income</button>
            <button type="button" class="btn btn-secondary" onclick="closeModal('incomeFormModal')">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <div id="layoutBottomNav"></div>

  <script src="js/components.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('layoutSidebar').innerHTML = renderSidebar('income');
    document.getElementById('layoutTopbar').innerHTML = renderTopbar('Income', 'Track your income sources and earnings');
    document.getElementById('layoutBottomNav').innerHTML = renderBottomNav('income');
    injectLayout();

    // KPIs
    const total = AppData.income.reduce((s,i) => s + i.amount, 0);
    setTimeout(() => {
      animateCounter(document.getElementById('incTotal'), total, '$');
      animateCounter(document.getElementById('incAvg'), Math.round(total / 6), '$');
      animateCounter(document.getElementById('incSources'), 4);
      animateCounter(document.getElementById('incBest'), 7190, '$');
    }, 200);

    // Table
    const tbody = document.getElementById('incomeTableBody');
    AppData.income.forEach(i => {
      tbody.innerHTML += `<tr>
        <td style="color:var(--text-primary);font-weight:500">${i.source}</td>
        <td>${i.desc}</td><td>${i.date}</td><td>${i.method}</td>
        <td style="color:var(--accent-emerald);font-weight:600">+$${i.amount.toLocaleString()}</td>
      </tr>`;
    });

    // Chart
    const textColor = () => document.body.classList.contains('light-mode') ? '#64648a' : '#8a8a9a';
    const gridColor = () => document.body.classList.contains('light-mode') ? 'rgba(0,0,0,0.06)' : 'rgba(255,255,255,0.06)';
    new Chart(document.getElementById('incomeChart'), {
      type: 'bar',
      data: {
        labels: ['Dec','Jan','Feb','Mar','Apr','May'],
        datasets: [{
          data: [5800,6100,5900,6400,6800,7190],
          backgroundColor: 'rgba(16,185,129,0.3)',
          borderColor: '#10b981', borderWidth: 1, borderRadius: 8, barPercentage: 0.6
        }]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{
          x:{grid:{color:gridColor()},ticks:{color:textColor(),font:{family:'Inter',size:11}}},
          y:{grid:{color:gridColor()},ticks:{color:textColor(),font:{family:'Inter',size:11}}}
        }
      }
    });

    // Form
    document.getElementById('iDate').valueAsDate = new Date();
    document.getElementById('incomeForm').addEventListener('submit', e => {
      e.preventDefault();
      showToast('Income added successfully!');
      closeModal('incomeFormModal');
      e.target.reset();
      document.getElementById('iDate').valueAsDate = new Date();
    });
  </script>
</body>
</html>
