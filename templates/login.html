{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ExpenseIQ — Log in to manage your finances"
    />
    <title>ExpenseIQ — Login</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    <style>
      html,
      body {
        height: 100%;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-primary);
        position: relative;
        overflow: hidden;
      }
      /* Animated background orbs */
      .bg-orb {
        position: fixed;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.15;
        animation: orbFloat 20s ease-in-out infinite;
        pointer-events: none;
        z-index: 0;
      }
      .bg-orb-1 {
        width: 500px;
        height: 500px;
        background: #10b981;
        top: -120px;
        right: -100px;
        animation-delay: 0s;
      }
      .bg-orb-2 {
        width: 400px;
        height: 400px;
        background: #8b5cf6;
        bottom: -80px;
        left: -80px;
        animation-delay: -7s;
      }
      .bg-orb-3 {
        width: 300px;
        height: 300px;
        background: #06b6d4;
        top: 50%;
        left: 50%;
        animation-delay: -14s;
      }
      @keyframes orbFloat {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        25% {
          transform: translate(30px, -40px) scale(1.05);
        }
        50% {
          transform: translate(-20px, 20px) scale(0.95);
        }
        75% {
          transform: translate(40px, 30px) scale(1.02);
        }
      }

      .auth-wrapper {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 440px;
        padding: 20px;
      }
      .auth-card {
        background: var(--glass);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-xl);
        padding: 40px 36px;
        box-shadow:
          var(--shadow-lg),
          0 0 60px rgba(16, 185, 129, 0.04);
      }
      .auth-header {
        text-align: center;
        margin-bottom: 32px;
      }
      .auth-logo {
        width: 56px;
        height: 56px;
        background: var(--gradient-emerald);
        border-radius: var(--radius-md);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
        font-weight: 800;
        color: #fff;
        margin: 0 auto 20px;
        box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
        transition: transform 0.3s ease;
      }
      .auth-logo:hover {
        transform: scale(1.08) rotate(-4deg);
      }
      .auth-title {
        font-size: 26px;
        font-weight: 700;
        margin-bottom: 8px;
        letter-spacing: -0.5px;
      }
      .auth-subtitle {
        color: var(--text-secondary);
        font-size: 14px;
        line-height: 1.5;
      }
      .auth-footer {
        text-align: center;
        margin-top: 28px;
        font-size: 14px;
        color: var(--text-secondary);
      }
      .auth-link {
        color: var(--accent-emerald);
        text-decoration: none;
        font-weight: 600;
        transition: opacity 0.2s;
      }
      .auth-link:hover {
        opacity: 0.8;
      }
      .auth-divider {
        display: flex;
        align-items: center;
        gap: 16px;
        margin: 24px 0;
        color: var(--text-muted);
        font-size: 12px;
      }
      .auth-divider::before,
      .auth-divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--glass-border);
      }

      /* Password toggle */
      .password-wrapper {
        position: relative;
      }
      .password-toggle {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        padding: 4px;
        display: flex;
        align-items: center;
        transition: color 0.2s;
      }
      .password-toggle:hover {
        color: var(--text-primary);
      }

      /* Alert messages */
      .auth-alert {
        padding: 12px 16px;
        border-radius: var(--radius-md);
        font-size: 13px;
        margin-bottom: 20px;
        display: none;
        animation: fadeIn 0.3s ease;
        line-height: 1.5;
      }
      .auth-alert.error {
        background: rgba(239, 68, 68, 0.1);
        color: #ef4444;
        border: 1px solid rgba(239, 68, 68, 0.2);
      }
      .auth-alert.success {
        background: rgba(16, 185, 129, 0.1);
        color: #10b981;
        border: 1px solid rgba(16, 185, 129, 0.2);
      }

      /* Loading state */
      .btn.loading {
        pointer-events: none;
        opacity: 0.7;
      }
      .btn.loading .btn-text {
        display: none;
      }
      .btn.loading .btn-spinner {
        display: inline-block;
      }
      .btn-spinner {
        display: none;
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Responsive */
      @media (max-width: 480px) {
        .auth-card {
          padding: 32px 24px;
        }
        .auth-title {
          font-size: 22px;
        }
        .bg-orb-1 {
          width: 300px;
          height: 300px;
        }
        .bg-orb-2 {
          width: 250px;
          height: 250px;
        }
        .bg-orb-3 {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>

    <div class="auth-wrapper">
      <div class="auth-card fade-in">
        <div class="auth-header">
          <div class="auth-logo">E</div>
          <h1 class="auth-title">Welcome Back</h1>
          <p class="auth-subtitle">Log in to your ExpenseIQ dashboard</p>
        </div>

        <div class="auth-alert" id="authAlert"></div>

        {% if messages %}
        <div style="margin-bottom: 20px">
          {% for message in messages %}
          <div class="auth-alert {{ message.tags }}" style="display: block">
            {{ message }}
          </div>
          {% endfor %}
        </div>
        {% endif %}

        <form id="loginForm" novalidate>
          <div class="form-group">
            <label class="form-label">Username or Email</label>
            <input
              type="text"
              name="username"
              class="form-input"
              id="loginIdentifier"
              placeholder="Enter username or email"
              required
              autocomplete="username"
            />
          </div>
          <div class="form-group">
            <div
              style="
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 8px;
              "
            >
              <label class="form-label" style="margin-bottom: 0"
                >Password</label
              >
              <a
                href="{% url 'password_reset' %}"
                class="auth-link"
                style="font-size: 13px"
                >Forgot Password?</a
              >
            </div>
            <div class="password-wrapper">
              <input
                type="password"
                name="password"
                class="form-input"
                id="loginPassword"
                placeholder="••••••••"
                required
                autocomplete="current-password"
              />
              <button
                type="button"
                class="password-toggle"
                id="togglePassword"
                tabindex="-1"
              >
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  width="18"
                  height="18"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>
          <button
            type="submit"
            class="btn btn-primary"
            id="loginBtn"
            style="width: 100%; margin-top: 16px; padding: 14px 24px"
          >
            <span class="btn-text">Log In</span>
            <div class="btn-spinner"></div>
          </button>
        </form>

        <div class="auth-footer">
          Don't have an account?
          <a href="{% url 'register' %}" class="auth-link">Create Account</a>
        </div>
      </div>
    </div>

    <script src="{% static 'js/auth.js' %}"></script>
    <script>
      // Password visibility toggle
      const toggleBtn = document.getElementById("togglePassword");
      const passwordInput = document.getElementById("loginPassword");
      toggleBtn.addEventListener("click", () => {
        const isPassword = passwordInput.type === "password";
        passwordInput.type = isPassword ? "text" : "password";
        toggleBtn.innerHTML = isPassword
          ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
          : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
      });

      // Show alert helper
      function showAlert(msg, type = "error") {
        const alert = document.getElementById("authAlert");
        alert.textContent = msg;
        alert.className = "auth-alert " + type;
        alert.style.display = "block";
      }

      // Login form handler — JWT API
      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const btn = document.getElementById("loginBtn");
          const identifier = document
            .getElementById("loginIdentifier")
            .value.trim();
          const password = document.getElementById("loginPassword").value;

          if (!identifier || !password) {
            showAlert("Please enter your username/email and password.");
            return;
          }

          btn.classList.add("loading");
          document.getElementById("authAlert").style.display = "none";

          const result = await Auth.login(identifier, password);

          if (result.success) {
            showAlert(
              result.message || "Login successful! Redirecting...",
              "success",
            );
            setTimeout(() => (window.location.href = "/"), 600);
          } else {
            btn.classList.remove("loading");
            showAlert(result.message || "Invalid credentials.");
          }
        });

      // If already authenticated, redirect
      if (Auth.isLoggedIn()) {
        Auth.fetchUser().then((user) => {
          if (user) window.location.href = "/";
        });
      }
    </script>
  </body>
</html>
