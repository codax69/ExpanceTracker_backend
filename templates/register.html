{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ExpenseIQ — Create your free account" />
    <title>ExpenseIQ — Register</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    <style>
      html,
      body {
        height: 100%;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-page);
        position: relative;
        overflow-x: hidden;
      }
      /* Soft background orbs */
      .bg-orb {
        position: fixed;
        border-radius: 50%;
        filter: blur(100px);
        opacity: 0.05;
        animation: orbFloat 20s ease-in-out infinite;
        pointer-events: none;
        z-index: 0;
      }
      .bg-orb-1 {
        width: 500px;
        height: 500px;
        background: var(--accent-primary);
        top: -120px;
        left: -100px;
      }
      .bg-orb-2 {
        width: 400px;
        height: 400px;
        background: var(--accent-success);
        bottom: -80px;
        right: -80px;
        animation-delay: -7s;
      }
      .bg-orb-3 {
        width: 300px;
        height: 300px;
        background: #06b6d4;
        bottom: 30%;
        left: 60%;
        animation-delay: -14s;
      }
      @keyframes orbFloat {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        25% {
          transform: translate(30px, -40px) scale(1.05);
        }
        50% {
          transform: translate(-20px, 20px) scale(0.95);
        }
        75% {
          transform: translate(40px, 30px) scale(1.02);
        }
      }
      .auth-wrapper {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 480px;
        padding: 20px;
      }
      .auth-card {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-card);
        padding: 36px 36px;
        box-shadow: var(--shadow-card);
      }
      .auth-header {
        text-align: center;
        margin-bottom: 28px;
      }
      .auth-logo {
        width: 56px;
        height: 56px;
        background: var(--accent-primary);
        border-radius: var(--radius-input);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
        font-weight: 600;
        color: #fff;
        margin: 0 auto 20px;
        box-shadow: 0 4px 12px rgba(79, 110, 247, 0.2);
        transition: transform 0.3s ease;
      }
      .auth-logo:hover {
        transform: scale(1.05);
      }
      .auth-title {
        font-size: 24px;
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: 8px;
        letter-spacing: -0.5px;
      }
      .auth-subtitle {
        color: var(--text-secondary);
        font-size: 14px;
      }
      .auth-footer {
        text-align: center;
        margin-top: 24px;
        font-size: 14px;
        color: var(--text-secondary);
      }
      .auth-link {
        color: var(--accent-primary);
        text-decoration: none;
        font-weight: 600;
        transition: opacity 0.2s;
      }
      .auth-link:hover {
        opacity: 0.8;
      }
      .auth-alert {
        padding: 12px 16px;
        border-radius: var(--radius-input);
        font-size: 13px;
        margin-bottom: 16px;
        display: none;
        animation: fadeIn 0.3s ease;
        line-height: 1.5;
      }
      .auth-alert.error {
        background: rgba(244, 91, 91, 0.1);
        color: var(--accent-danger);
        border: 1px solid rgba(244, 91, 91, 0.2);
      }
      .auth-alert.success {
        background: rgba(34, 196, 138, 0.1);
        color: var(--accent-success);
        border: 1px solid rgba(34, 196, 138, 0.2);
      }

      .password-wrapper {
        position: relative;
      }
      .password-toggle {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--text-secondary);
        cursor: pointer;
        padding: 4px;
        display: flex;
        transition: color 0.2s;
      }
      .password-toggle:hover {
        color: var(--text-primary);
      }

      /* Password strength meter */
      .password-strength {
        margin-top: 8px;
      }
      .strength-bar {
        height: 4px;
        border-radius: 2px;
        background: var(--bg-page);
        overflow: hidden;
        margin-bottom: 4px;
      }
      .strength-fill {
        height: 100%;
        border-radius: 2px;
        transition:
          width 0.3s,
          background 0.3s;
        width: 0;
      }
      .strength-text {
        font-size: 11px;
        color: var(--text-secondary);
      }

      .btn.loading {
        pointer-events: none;
        opacity: 0.7;
      }
      .btn.loading .btn-text {
        display: none;
      }
      .btn.loading .btn-spinner {
        display: inline-block;
      }
      .btn-spinner {
        display: none;
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      @media (max-width: 480px) {
        .auth-card {
          padding: 28px 20px;
        }
        .auth-title {
          font-size: 22px;
        }
        .form-row {
          grid-template-columns: 1fr;
          gap: 0;
        }
        .bg-orb-3 {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>

    <div class="auth-wrapper">
      <div class="auth-card fade-in">
        <div class="auth-header">
          <div class="auth-logo">E</div>
          <h1 class="auth-title">Create Account</h1>
          <p class="auth-subtitle">
            Join ExpenseIQ and take control of your finances
          </p>
        </div>

        <div class="auth-alert" id="authAlert"></div>

        <form id="registerForm" novalidate>
          <div class="form-group">
            <label class="form-label">Username</label>
            <input
              type="text"
              class="form-input"
              id="regUsername"
              placeholder="Choose a username"
              required
              autocomplete="username"
            />
          </div>
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input
              type="email"
              class="form-input"
              id="regEmail"
              placeholder="name@example.com"
              required
              autocomplete="email"
            />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Password</label>
              <div class="password-wrapper">
                <input
                  type="password"
                  class="form-input"
                  id="regPassword"
                  placeholder="Min. 8 characters"
                  required
                  autocomplete="new-password"
                />
                <button
                  type="button"
                  class="password-toggle"
                  id="togglePassword"
                  tabindex="-1"
                >
                  <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    width="18"
                    height="18"
                  >
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                    <circle cx="12" cy="12" r="3" />
                  </svg>
                </button>
              </div>
              <div class="password-strength" id="passwordStrength">
                <div class="strength-bar">
                  <div class="strength-fill" id="strengthFill"></div>
                </div>
                <span class="strength-text" id="strengthText"></span>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Confirm Password</label>
              <div class="password-wrapper">
                <input
                  type="password"
                  class="form-input"
                  id="regConfirmPassword"
                  placeholder="••••••••"
                  required
                  autocomplete="new-password"
                />
              </div>
            </div>
          </div>
          <button
            type="submit"
            class="btn btn-primary"
            id="registerBtn"
            style="width: 100%; margin-top: 16px; padding: 14px 24px"
          >
            <span class="btn-text">Create Account</span>
            <div class="btn-spinner"></div>
          </button>
        </form>

        <div class="auth-footer">
          Already have an account?
          <a href="{% url 'login' %}" class="auth-link">Log In</a>
        </div>
      </div>
    </div>

    <script src="{% static 'js/auth.js' %}"></script>
    <script>
      // Password toggle
      const toggleBtn = document.getElementById("togglePassword");
      const pwInput = document.getElementById("regPassword");
      toggleBtn.addEventListener("click", () => {
        const isPassword = pwInput.type === "password";
        pwInput.type = isPassword ? "text" : "password";
        toggleBtn.innerHTML = isPassword
          ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
          : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
      });

      // Password strength meter
      document.getElementById("regPassword").addEventListener("input", (e) => {
        const pw = e.target.value;
        const fill = document.getElementById("strengthFill");
        const text = document.getElementById("strengthText");
        let score = 0;
        if (pw.length >= 8) score++;
        if (/[A-Z]/.test(pw)) score++;
        if (/[0-9]/.test(pw)) score++;
        if (/[^A-Za-z0-9]/.test(pw)) score++;
        if (pw.length >= 12) score++;

        const levels = [
          { w: "0%", c: "transparent", t: "" },
          { w: "20%", c: "#ef4444", t: "Weak" },
          { w: "40%", c: "#f59e0b", t: "Fair" },
          { w: "60%", c: "#f59e0b", t: "Good" },
          { w: "80%", c: "#10b981", t: "Strong" },
          { w: "100%", c: "#10b981", t: "Very Strong" },
        ];
        const level = levels[score] || levels[0];
        fill.style.width = level.w;
        fill.style.background = level.c;
        text.textContent = pw ? level.t : "";
        text.style.color = level.c;
      });

      // Alert
      function showAlert(msg, type = "error") {
        const alert = document.getElementById("authAlert");
        alert.textContent = msg;
        alert.className = "auth-alert " + type;
        alert.style.display = "block";
      }

      // Register form — JWT API
      document
        .getElementById("registerForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const btn = document.getElementById("registerBtn");
          const username = document.getElementById("regUsername").value.trim();
          const email = document.getElementById("regEmail").value.trim();
          const password = document.getElementById("regPassword").value;
          const confirmPassword =
            document.getElementById("regConfirmPassword").value;

          // Client-side validation
          if (!username || !email || !password) {
            showAlert("Please fill in all required fields.");
            return;
          }
          if (password.length < 8) {
            showAlert("Password must be at least 8 characters.");
            return;
          }
          if (password !== confirmPassword) {
            showAlert("Passwords do not match.");
            return;
          }

          btn.classList.add("loading");
          document.getElementById("authAlert").style.display = "none";

          const result = await Auth.register(
            username,
            email,
            password,
            confirmPassword,
          );

          if (result.success) {
            showAlert(
              result.message || "Account created! Redirecting...",
              "success",
            );
            setTimeout(() => (window.location.href = "/"), 600);
          } else {
            btn.classList.remove("loading");
            let msg = result.message;
            if (result.errors && Array.isArray(result.errors)) {
              msg += ": " + result.errors.join(", ");
            }
            showAlert(msg);
          }
        });

      // Redirect if already logged in
      if (Auth.isLoggedIn()) {
        Auth.fetchUser().then((user) => {
          if (user) window.location.href = "/";
        });
      }
    </script>
  </body>
</html>
