{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExpenseIQ — Budget</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    <style>
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(5px);
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        pointer-events: none;
        transition: all 0.3s ease;
        z-index: 1000;
      }
      .modal-overlay.open {
        opacity: 1;
        pointer-events: auto;
      }
      .modal {
        background: var(--bg-card);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: 24px;
        width: 100%;
        max-width: 500px;
        box-shadow: var(--shadow-lg);
        transform: scale(0.9);
        transition: all 0.3s ease;
      }
      .modal-overlay.open .modal {
        transform: scale(1);
      }
    </style>
  </head>
  <body>
    <div id="layoutSidebar"></div>
    <div class="main-content">
      <div id="layoutTopbar"></div>
      <div class="page fade-in">
        <!-- Top KPIs / Monthly Budget / Progress -->
        <div class="kpi-grid">
          <div class="kpi-card purple">
            <div class="kpi-icon purple">🎯</div>
            <div class="kpi-label">Total Budget</div>
            <div class="kpi-value" id="kpiTotalBudget">$0</div>
          </div>
          <div class="kpi-card orange">
            <div class="kpi-icon orange">💸</div>
            <div class="kpi-label">Total Spent</div>
            <div class="kpi-value" id="kpiTotalSpent">$0</div>
          </div>
          <div class="kpi-card emerald">
            <div class="kpi-icon emerald">💰</div>
            <div class="kpi-label">Remaining Budget</div>
            <div class="kpi-value" id="kpiRemainingBudget">$0</div>
          </div>
          <div class="kpi-card cyan">
            <div class="kpi-icon cyan">📈</div>
            <div class="kpi-label">Saving Ratio</div>
            <div class="kpi-value" id="kpiSavingRatio">0%</div>
          </div>
        </div>

        <!-- Set Budget -->
        <div class="card" style="margin-top: 24px">
          <div class="card-header">
            <div class="card-title">Set Budget</div>
            <button
              class="btn btn-primary btn-sm"
              onclick="openModal('budgetModal')"
            >
              + New Budget
            </button>
          </div>
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Category</th>
                  <th>Budget</th>
                  <th>Spent</th>
                  <th>Remaining</th>
                  <th>Progress</th>
                </tr>
              </thead>
              <tbody id="budgetTableBody"></tbody>
            </table>
          </div>
        </div>

        <!-- Budget Progress -->
        <div class="card" style="margin-top: 24px">
          <div class="card-header">
            <div class="card-title">Budget Progress</div>
          </div>
          <div
            class="card-body"
            id="budgetProgressContainer"
            style="
              display: grid;
              grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
              gap: 16px;
              padding: 16px;
            "
          >
            <!-- Dynamic progress cards will go here -->
          </div>
        </div>

        <!-- Budget History -->
        <div class="card" style="margin-top: 24px">
          <div class="card-header">
            <div class="card-title">Budget History</div>
          </div>
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Month</th>
                  <th>Set Budget</th>
                  <th>Actual Spent</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="budgetHistoryBody">
                <tr>
                  <td
                    colspan="4"
                    style="text-align: center; color: var(--text-muted)"
                  >
                    Loading...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- Set Budget Modal -->
    <div class="modal-overlay" id="budgetModal">
      <div class="modal">
        <div class="modal-header">
          <h2 class="modal-title">Set Category Budget</h2>
          <button class="modal-close" onclick="closeModal('budgetModal')">
            ✕
          </button>
        </div>
        <form id="budgetForm">
          <div class="form-group">
            <label class="form-label">Category</label>
            <select class="form-select" id="bCategory" required></select>
          </div>
          <div class="form-group">
            <label class="form-label">Timeframe</label>
            <select class="form-select" id="bTimeframe" required>
              <option value="monthly">Monthly</option>
              <option value="weekly">Weekly</option>
              <option value="daily">Daily</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Amount ($)</label>
            <input
              type="number"
              class="form-input"
              id="bAmount"
              required
              min="1"
              step="0.01"
              placeholder="e.g. 100"
            />
          </div>
          <div style="display: flex; gap: 12px; margin-top: 24px">
            <button type="submit" class="btn btn-primary" style="flex: 1">
              Save Budget
            </button>
            <button
              type="button"
              class="btn btn-secondary"
              onclick="closeModal('budgetModal')"
            >
              Cancel
            </button>
          </div>
        </form>
      </div>
    </div>

    <div id="layoutBottomNav"></div>
    <script src="{% static 'js/auth.js' %}?v=4.1"></script>
    <script src="{% static 'js/components.js' %}?v=4.1"></script>
    <script src="{% static 'js/app.js' %}?v=4.1"></script>
    <script>
      document.getElementById("layoutSidebar").innerHTML =
        renderSidebar("budget");
      document.getElementById("layoutTopbar").innerHTML = renderTopbar(
        "Budget",
        "Plan and monitor your spending limits",
      );
      document.getElementById("layoutBottomNav").innerHTML =
        renderBottomNav("budget");

      function openModal(id) {
        document.getElementById(id).classList.add("open");
      }
      function closeModal(id) {
        document.getElementById(id).classList.remove("open");
      }

      let allCategories = [];
      let analyticsData = [];
      let budgetWarnings = null;
      let budgetHistory = [];

      async function fetchBudgetData() {
        if (typeof Auth !== "undefined") await Auth.init();
        const now = new Date();

        const [catRes, analyticsRes, warningsRes, historyRes] =
          await Promise.all([
            Auth.apiFetch("/api/v1/categories"),
            Auth.apiFetch("/api/v1/analytics/categories"),
            Auth.apiFetch("/api/v1/budget/warnings"),
            Auth.apiFetch("/api/v1/budget/all"),
          ]);

        if (catRes && catRes.success) allCategories = catRes.data;
        if (analyticsRes && analyticsRes.success)
          analyticsData = analyticsRes.data;
        if (warningsRes && warningsRes.success)
          budgetWarnings = warningsRes.data;
        if (historyRes && historyRes.success) budgetHistory = historyRes.data;

        // Populate Categories Dropdown
        const catSelect = document.getElementById("bCategory");
        catSelect.innerHTML = "";
        allCategories.forEach((c) => {
          catSelect.innerHTML += `<option value="${c.id}">${c.icon || "\ud83d\udce6"} ${c.name}</option>`;
        });

        renderBudgets();
        renderBudgetProgress();
        renderBudgetHistory();
      }

      function renderBudgets() {
        const tbody = document.getElementById("budgetTableBody");
        tbody.innerHTML = "";
        let totalBudget = 0,
          totalSpent = 0;

        // Use overall budget from warnings API if available
        if (budgetWarnings && budgetWarnings.budget) {
          totalBudget = budgetWarnings.budget;
          totalSpent = budgetWarnings.spent || 0;
        }

        allCategories.forEach((c) => {
          const aData = analyticsData.find((a) => a.category === c.name) || {
            spent: 0,
          };
          const spent = aData.spent || 0;
          const budget = parseFloat(c.monthlyBudget) || 0;
          if (!budgetWarnings || !budgetWarnings.budget) {
            totalBudget += budget;
            totalSpent += spent;
          }
          const progress =
            budget > 0 ? Math.min((spent / budget) * 100, 100).toFixed(0) : 0;
          const remaining = budget - spent;
          const color = c.color || "#06b6d4";
          tbody.innerHTML += `<tr>
          <td><span class="badge badge-cyan" style="background:${color}20; color:${color}">${c.icon || "\ud83d\udce6"} ${c.name}</span></td>
          <td>${Settings.formatCurrency(budget)}</td>
          <td>${Settings.formatCurrency(spent)}</td>
          <td style="color:${remaining >= 0 ? "var(--accent-emerald)" : "var(--accent-red)"}">${Settings.formatCurrency(remaining)}</td>
          <td><div style="display:flex;align-items:center;gap:8px">
            <div style="flex:1;height:6px;background:var(--bg-hover);border-radius:3px;overflow:hidden">
              <div style="height:100%;width:${progress}%;background:${progress > 90 ? "var(--accent-red)" : "var(--accent-primary)"}"></div>
            </div><span style="font-size:12px;color:var(--text-secondary)">${progress}%</span>
          </div></td></tr>`;
        });

        const remainingBudget = totalBudget - totalSpent;
        document.getElementById("kpiTotalBudget").textContent =
          Settings.formatCurrency(totalBudget);
        document.getElementById("kpiTotalSpent").textContent =
          Settings.formatCurrency(totalSpent);
        document.getElementById("kpiRemainingBudget").textContent =
          Settings.formatCurrency(remainingBudget);
        const savingRatio =
          totalBudget > 0
            ? ((remainingBudget / totalBudget) * 100).toFixed(1)
            : 0;
        document.getElementById("kpiSavingRatio").textContent =
          (savingRatio > 0 ? savingRatio : 0) + "%";
      }

      function renderBudgetProgress() {
        const container = document.getElementById("budgetProgressContainer");
        container.innerHTML = "";
        allCategories.forEach((c) => {
          const aData = analyticsData.find((a) => a.category === c.name) || {
            spent: 0,
          };
          const spent = aData.spent || 0;
          const budget = parseFloat(c.monthlyBudget) || 0;
          if (budget <= 0) return;
          const progress = Math.min((spent / budget) * 100, 100).toFixed(0);
          container.innerHTML += `<div style="padding:16px;background:var(--bg-hover);border-radius:var(--radius-md);border:1px solid var(--glass-border);">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
            <span style="font-weight:600;color:var(--text-primary);">${c.icon || "\ud83d\udce6"} ${c.name}</span>
            <span class="badge badge-cyan">Monthly</span>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--text-secondary);margin-bottom:6px;">
            <span>Spent: ${Settings.formatCurrency(spent)}</span><span>Budget: ${Settings.formatCurrency(budget)}</span>
          </div>
          <div style="height:6px;background:var(--bg-card);border-radius:3px;overflow:hidden;">
            <div style="height:100%;width:${progress}%;background:${progress > 90 ? "var(--accent-red)" : "var(--accent-primary)"};transition:width 0.3s;"></div>
          </div>
          <div style="text-align:right;font-size:12px;color:var(--text-muted);margin-top:4px;">${progress}%</div>
        </div>`;
        });
      }

      function renderBudgetHistory() {
        const historyBody = document.getElementById("budgetHistoryBody");
        if (!historyBody) return;
        historyBody.innerHTML = "";
        if (budgetHistory.length === 0) {
          historyBody.innerHTML =
            '<tr><td colspan="4" style="text-align:center">No budget history yet</td></tr>';
          return;
        }
        const months = [
          "Jan",
          "Feb",
          "Mar",
          "Apr",
          "May",
          "Jun",
          "Jul",
          "Aug",
          "Sep",
          "Oct",
          "Nov",
          "Dec",
        ];
        budgetHistory.forEach((b) => {
          const label = months[b.month - 1] + " " + b.year;
          const budget = parseFloat(b.totalMonthlyBudget) || 0;
          const statusBadge = '<span class="badge badge-cyan">Set</span>';
          historyBody.innerHTML += `<tr><td>${label}</td><td>${Settings.formatCurrency(budget)}</td><td>—</td><td>${statusBadge}</td></tr>`;
        });
      }

      fetchBudgetData();

      // Form: set category budget + overall monthly budget
      document
        .getElementById("budgetForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const catId = document.getElementById("bCategory").value;
          const timeframe = document.getElementById("bTimeframe").value;
          let amount = parseFloat(document.getElementById("bAmount").value);

          let normalizedMonthly = amount;
          if (timeframe === "weekly") normalizedMonthly = amount * 4.33;
          if (timeframe === "daily") normalizedMonthly = amount * 30;

          // 1. Update category budget
          const catRes = await Auth.apiFetch(`/api/v1/categories/${catId}`, {
            method: "PUT",
            body: JSON.stringify({
              monthlyBudget: Math.round(normalizedMonthly),
            }),
          });

          // 2. Also set overall monthly budget via Budget API
          const now = new Date();
          const totalBudget = allCategories.reduce((sum, c) => {
            if (String(c.id) === String(catId))
              return sum + Math.round(normalizedMonthly);
            return sum + (parseFloat(c.monthlyBudget) || 0);
          }, 0);

          await Auth.apiFetch("/api/v1/budget", {
            method: "POST",
            body: JSON.stringify({
              month: now.getMonth() + 1,
              year: now.getFullYear(),
              totalMonthlyBudget: totalBudget,
              warningThreshold: 80,
            }),
          });

          if (catRes && catRes.success) {
            showToast("Budget updated successfully!", "success");
            closeModal("budgetModal");
            fetchBudgetData();
          } else {
            showToast("Failed to update budget", "error");
          }
        });
    </script>
  </body>
</html>
