{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExpenseIQ — Reset Password</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top right, #1a1a2e, #0a0a0f);
      min-height: 100vh;
    }
    .auth-container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }
    .auth-card {
      background: var(--glass);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      padding: 40px;
      box-shadow: var(--shadow-lg);
    }
    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-logo {
      width: 48px;
      height: 48px;
      background: var(--gradient-emerald);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 800;
      color: #fff;
      margin: 0 auto 16px;
    }
    .auth-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .auth-subtitle {
      color: var(--text-secondary);
      font-size: 14px;
    }
    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-secondary);
    }
    .auth-link {
      color: var(--accent-emerald);
      text-decoration: none;
      font-weight: 600;
    }
    .messages {
      margin-bottom: 20px;
    }
    .message {
      padding: 12px 16px;
      border-radius: var(--radius-md);
      font-size: 14px;
      margin-bottom: 8px;
    }
    .message.error {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card fade-in">
      <div class="auth-header">
        <div class="auth-logo">E</div>
        <h1 class="auth-title">Reset Password</h1>
        <p class="auth-subtitle">Enter your username to set a new password</p>
      </div>

      {% if messages %}
      <div class="messages">
        {% for message in messages %}
        <div class="message {{ message.tags }}">{{ message }}</div>
        {% endfor %}
      </div>
      {% endif %}

      <form method="POST">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-input" placeholder="Your username" required>
        </div>
        <div class="form-group">
          <label class="form-label">New Password</label>
          <input type="password" name="new_password" class="form-input" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; margin-top:12px;">Reset Password</button>
      </form>

      <div class="auth-footer">
        Remembered your password? <a href="{% url 'login' %}" class="auth-link">Log In</a>
      </div>
    </div>
  </div>
</body>
</html>
