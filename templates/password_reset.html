{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ExpenseIQ — Reset your password" />
    <title>ExpenseIQ — Reset Password</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    <style>
      html,
      body {
        height: 100%;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-page);
        position: relative;
        overflow: hidden;
      }
      /* Soft background orbs */
      .bg-orb {
        position: fixed;
        border-radius: 50%;
        filter: blur(100px);
        opacity: 0.05;
        animation: orbFloat 20s ease-in-out infinite;
        pointer-events: none;
        z-index: 0;
      }
      .bg-orb-1 {
        width: 450px;
        height: 450px;
        background: #f59e0b;
        top: -100px;
        right: -80px;
      }
      .bg-orb-2 {
        width: 350px;
        height: 350px;
        background: var(--accent-primary);
        bottom: -60px;
        left: -60px;
        animation-delay: -7s;
      }
      @keyframes orbFloat {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        25% {
          transform: translate(30px, -40px) scale(1.05);
        }
        50% {
          transform: translate(-20px, 20px) scale(0.95);
        }
        75% {
          transform: translate(40px, 30px) scale(1.02);
        }
      }
      .auth-wrapper {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 440px;
        padding: 20px;
      }
      .auth-card {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-card);
        padding: 40px 36px;
        box-shadow: var(--shadow-card);
      }
      .auth-header {
        text-align: center;
        margin-bottom: 32px;
      }
      .auth-logo {
        width: 56px;
        height: 56px;
        background: var(--accent-primary);
        border-radius: var(--radius-input);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        margin: 0 auto 20px;
        box-shadow: 0 4px 12px rgba(79, 110, 247, 0.2);
      }
      .auth-title {
        font-size: 24px;
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: 8px;
        letter-spacing: -0.5px;
      }
      .auth-subtitle {
        color: var(--text-secondary);
        font-size: 14px;
        line-height: 1.5;
      }
      .auth-footer {
        text-align: center;
        margin-top: 28px;
        font-size: 14px;
        color: var(--text-secondary);
      }
      .auth-link {
        color: var(--accent-primary);
        text-decoration: none;
        font-weight: 600;
      }
      .auth-alert {
        padding: 12px 16px;
        border-radius: var(--radius-input);
        font-size: 13px;
        margin-bottom: 20px;
        display: none;
        animation: fadeIn 0.3s ease;
        line-height: 1.5;
      }
      .auth-alert.error {
        background: rgba(244, 91, 91, 0.1);
        color: var(--accent-danger);
        border: 1px solid rgba(244, 91, 91, 0.2);
      }
      .auth-alert.success {
        background: rgba(34, 196, 138, 0.1);
        color: var(--accent-success);
        border: 1px solid rgba(34, 196, 138, 0.2);
      }
      .password-wrapper {
        position: relative;
      }
      .password-toggle {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--text-secondary);
        cursor: pointer;
        padding: 4px;
        display: flex;
        transition: color 0.2s;
      }
      .password-toggle:hover {
        color: var(--text-primary);
      }
      @media (max-width: 480px) {
        .auth-card {
          padding: 32px 24px;
        }
        .auth-title {
          font-size: 22px;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <div class="auth-wrapper">
      <div class="auth-card fade-in">
        <div class="auth-header">
          <div class="auth-logo">🔑</div>
          <h1 class="auth-title">Reset Password</h1>
          <p class="auth-subtitle">
            Enter your username and set a new password
          </p>
        </div>

        <div class="auth-alert" id="authAlert"></div>

        {% if messages %}
        <div style="margin-bottom: 20px">
          {% for message in messages %}
          <div class="auth-alert {{ message.tags }}" style="display: block">
            {{ message }}
          </div>
          {% endfor %}
        </div>
        {% endif %}

        <form method="POST" id="resetForm">
          {% csrf_token %}
          <div class="form-group">
            <label class="form-label">Username</label>
            <input
              type="text"
              name="username"
              class="form-input"
              placeholder="Enter your username"
              required
              autocomplete="username"
            />
          </div>
          <div class="form-group">
            <label class="form-label">New Password</label>
            <div class="password-wrapper">
              <input
                type="password"
                name="new_password"
                class="form-input"
                placeholder="Min. 8 characters"
                required
              />
              <button
                type="button"
                class="password-toggle"
                onclick="togglePwVisibility(this)"
              >
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  width="18"
                  height="18"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>
          <button
            type="submit"
            class="btn btn-primary"
            style="width: 100%; margin-top: 16px; padding: 14px 24px"
          >
            Reset Password
          </button>
        </form>

        <div class="auth-footer">
          Remembered your password?
          <a href="{% url 'login' %}" class="auth-link">Log In</a>
        </div>
      </div>
    </div>

    <script>
      function togglePwVisibility(btn) {
        const input = btn.previousElementSibling;
        const isPassword = input.type === "password";
        input.type = isPassword ? "text" : "password";
        btn.innerHTML = isPassword
          ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
          : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
      }
    </script>
  </body>
</html>
