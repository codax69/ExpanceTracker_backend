services:
  # ── MySQL Database ─────────────────────────────────────────────────────────
  db:
    image: mysql:8.4
    container_name: expensetracker_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-expensetracker}
      MYSQL_USER: ${MYSQL_USER:-expenseuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-expensepass}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    ports:
      - "3307:3306"          # exposed on host port 3307 to avoid conflicts
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - expensetracker_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER:-expenseuser}", "-p${MYSQL_PASSWORD:-expensepass}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Django Backend ─────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expensetracker_web
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      USE_MYSQL: "True"
      MYSQL_HOST: db
      MYSQL_PORT: "3306"
    ports:
      - "8000:8000"
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    networks:
      - expensetracker_net

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: expensetracker_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
    depends_on:
      - web
    networks:
      - expensetracker_net

volumes:
  mysql_data:
    driver: local
  media_files:
    driver: local
  static_files:
    driver: local

networks:
  expensetracker_net:
    driver: bridge
